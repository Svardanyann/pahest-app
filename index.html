<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pahest - Կատալոգ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ԿԱՏԱԼՈԳ</h1>
        <div class="header-buttons">
            <button onclick="showSection('catalog')">🏠</button>
            <button onclick="showSection('history')">📜</button>
            <button onclick="openCart()" id="cart-btn">🛒 <span id="cart-count">0</span></button>
        </div>
    </header>

    <!-- Կատալոգի բաժին -->
    <section id="catalog-section">
        <div id="catalog-grid" class="grid"></div>
    </section>

    <!-- Պատմության բաժին -->
    <section id="history-section" style="display:none;">
        <div id="history-list"></div>
    </section>

    <!-- Զամբյուղի Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCart()">&times;</span>
            <h2>Զամբյուղ</h2>
            <div id="cart-items"></div>
            <hr>
            <p>Ընդհանուր: <b id="cart-total">0</b> դրամ</p>
            <button class="btn-block" onclick="checkout()">Հաստատել պատվերը</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
