<!DOCTYPE html>
<html lang="hy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Իմ Պահեստը</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .cart-badge { position: absolute; top: -5px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
      .modal-anim { animation: fadeIn 0.2s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
  </head>
  <body class="bg-gray-100 pb-24">
    <!-- Վերևի Մաս -->
    <div class="bg-blue-600 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
      <h1 class="font-bold text-lg italic">Իմ Վաճառքները</h1>
      <button onclick="openModal()" class="bg-white text-blue-600 px-3 py-1 rounded-lg text-sm font-bold shadow-lg active:scale-95">+ Ապրանք</button>
    </div>

    <div id="app" class="p-4">
      <!-- Կատալոգի Բաժին -->
      <div id="catalog-section">
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
      </div>

      <!-- Պատմության Բաժին -->
      <div id="history-section" class="hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-gray-700">Պատմություն</h2>
            <button onclick="clearHistory()" class="text-red-500 text-xs border border-red-200 px-2 py-1 rounded">Մաքրել</button>
        </div>
        <div id="history-list" class="space-y-4"></div>
      </div>
    </div>

    <!-- Զամբյուղի լողացող կոճակ -->
    <div id="cart-btn" class="fixed bottom-20 right-4 z-20 hidden">
        <button onclick="showCart()" class="bg-orange-500 text-white p-4 rounded-full shadow-2xl relative">
            <span class="text-2xl">🛒</span>
            <span id="cart-count" class="cart-badge font-bold">0</span>
        </button>
    </div>

    <!-- Նոր Ապրանքի Պատուհան -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-40">
      <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl modal-anim">
        <h3 class="font-bold mb-4">Ավելացնել Ապրանք</h3>
        <input id="prod-name" type="text" placeholder="Անուն" class="w-full border p-3 mb-3 rounded-xl outline-none" />
        <input id="prod-price" type="number" placeholder="Գին" class="w-full border p-3 mb-3 rounded-xl outline-none" />
        <input id="prod-img-file" type="file" accept="image/*" class="w-full border p-2 mb-5 rounded-xl text-sm" />
        <div class="flex gap-2 font-bold">
          <button onclick="closeModal()" class="flex-1 border p-3 rounded-xl">Չեղարկել</button>
          <button onclick="addProduct()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl">Ավելացնել</button>
        </div>
      </div>
    </div>

    <!-- Զամբյուղի Պատուհան -->
    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-40">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm flex flex-col modal-anim">
            <h3 class="font-bold mb-4 border-b pb-2">Զամբյուղ</h3>
            <div id="cart-items" class="space-y-3 mb-4 overflow-y-auto max-h-[50vh]"></div>
            <div class="font-bold text-lg text-right mb-4 text-blue-600" id="cart-total-price">0 ֏</div>
            <div class="flex gap-2">
                <button onclick="closeCart()" class="flex-1 border p-3 rounded-xl text-gray-500 font-bold">Փակել</button>
                <button onclick="checkout()" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold shadow-lg">ՊԱՀՊԱՆԵԼ</button>
            </div>
        </div>
    </div>

    <!-- Ներքևի Մենյու -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-10">
      <button onclick="showSection('catalog')" class="flex flex-col items-center flex-1" id="nav-catalog">
        <span class="text-xl">📦</span> <span class="text-[10px]">ԿԱՏԱԼՈԳ</span>
      </button>
      <button onclick="showSection('history')" class="flex flex-col items-center flex-1 text-gray-400" id="nav-history">
        <span class="text-xl">📜</span> <span class="text-[10px]">ՊԱՏՄՈՒԹՅՈՒՆ</span>
      </button>
    </nav>

    <script>
      let products = JSON.parse(localStorage.getItem("myProducts")) || [];
      let history = JSON.parse(localStorage.getItem("orderHistory")) || [];
      let cart = [];

      function showSection(section) {
        document.getElementById("catalog-section").classList.toggle("hidden", section !== "catalog");
        document.getElementById("history-section").classList.toggle("hidden", section !== "history");
        document.getElementById("nav-catalog").className = section === 'catalog' ? 'flex flex-col items-center flex-1 text-blue-600 font-bold' : 'flex flex-col items-center flex-1 text-gray-400';
        document.getElementById("nav-history").className = section === 'history' ? 'flex flex-col items-center flex-1 text-blue-600 font-bold' : 'flex flex-col items-center flex-1 text-gray-400';
        if (section === "history") renderHistory();
      }

      function openModal() { document.getElementById("modal").classList.remove("hidden"); }
      function closeModal() { document.getElementById("modal").classList.add("hidden"); }

      function addProduct() {
        const name = document.getElementById("prod-name").value;
        const price = document.getElementById("prod-price").value;
        const fileInput = document.getElementById("prod-img-file");
        if (!name || !price) return alert("Լրացրեք տվյալները");

        const save = (img) => {
            products.push({ id: Date.now(), name, price: parseInt(price), img });
            localStorage.setItem("myProducts", JSON.stringify(products));
            renderCatalog();
            closeModal();
            document.getElementById("prod-name").value = "";
            document.getElementById("prod-price").value = "";
            document.getElementById("prod-img-file").value = "";
        };

        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = () => save(reader.result);
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            save("https://via.placeholder.com/150");
        }
      }

      function deleteProduct(id) {
          if (confirm("Ջնջե՞լ:")) {
              products = products.filter(p => p.id !== id);
              localStorage.setItem("myProducts", JSON.stringify(products));
              renderCatalog();
          }
      }

      function renderCatalog() {
        const list = document.getElementById("product-list");
        list.innerHTML = products.length === 0 ? '<div class="col-span-2 text-center py-10">Դատարկ է</div>' : "";
        products.forEach((p) => {
          list.innerHTML += `
            <div class="bg-white p-2 rounded-2xl shadow-sm border relative">
                <button onclick="deleteProduct(${p.id})" class="absolute top-1 right-1 bg-white/90 w-6 h-6 rounded-full text-[10px] z-10">🗑️</button>
                <img src="${p.img}" class="w-full h-32 object-cover rounded-xl mb-2">
                <div class="font-bold text-[11px] h-8 overflow-hidden">${p.name}</div>
                <div class="text-blue-600 font-bold text-sm mb-2">${p.price.toLocaleString()} ֏</div>
                <button onclick="addToCart(${p.id})" class="w-full bg-orange-500 text-white py-2 rounded-xl text-[10px] font-bold">+ ԱՎԵԼԱՑՆԵԼ</button>
            </div>`;
        });
      }

      function addToCart(id) {
          const p = products.find(x => x.id === id);
          const qty = prompt(p.name + "\nՔանակը:", 1);
          if (qty > 0) { 
              cart.push({ name: p.name, price: p.price, img: p.img, qty: parseInt(qty) }); 
              updateCartUI(); 
          }
      }

      function updateCartUI() {
          document.getElementById("cart-count").innerText = cart.length;
          document.getElementById("cart-btn").classList.toggle("hidden", cart.length === 0);
      }

      function showCart() {
          document.getElementById("cart-modal").classList.remove("hidden");
          const container = document.getElementById("cart-items");
          container.innerHTML = "";
          let total = 0;
          cart.forEach((item) => {
              total += item.price * item.qty;
              container.innerHTML += `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-xl border">
                    <div class="flex items-center gap-2">
                        <img src="${item.img}" class="w-10 h-10 object-cover rounded">
                        <div class="flex flex-col text-[10px]">
                            <span class="font-bold">${item.name}</span>
                            <span>${item.price} x ${item.qty}</span>
                        </div>
                    </div>
                    <span class="font-bold text-blue-600 text-xs">${(item.price * item.qty).toLocaleString()} ֏</span>
                </div>`;
          });
          document.getElementById("cart-total-price").innerText = total.toLocaleString() + " ֏";
      }

      function closeCart() { document.getElementById("cart-modal").classList.add("hidden"); }

      function checkout() {
          const user = prompt("Պատվիրատուի անունը:");
          if (!user) return;

          const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
          const newOrder = {
              id: Date.now(),
              customer: user,
              items: cart, // Հիմա ուղղակի պահում ենք զամբյուղը
              total: total,
              date: new Date().toLocaleString("hy-AM")
          };

          history.unshift(newOrder);
          localStorage.setItem("orderHistory", JSON.stringify(history));
          
          cart = []; // Մաքրում ենք զամբյուղը
          updateCartUI();
          closeCart();
          showSection('history');
      }

      function clearHistory() {
          if (confirm("Մաքրե՞լ:")) { history = []; localStorage.setItem("orderHistory", JSON.stringify(history)); renderHistory(); }
      }

      function renderHistory() {
        const list = document.getElementById("history-list");
        list.innerHTML = history.length === 0 ? '<div class="text-center py-20 text-gray-400">Դեռ չկա</div>' : "";
        history.forEach((h) => {
          let itemsHtml = h.items.map(i => `
            <div class="flex justify-between items-center py-1 border-b border-gray-50 last:border-0">
                <div class="flex items-center gap-2">
                    <img src="${i.img}" class="w-7 h-7 object-cover rounded">
                    <span class="text-[10px] text-gray-600">${i.name} (x${i.qty})</span>
                </div>
                <span class="text-[10px] font-bold">${(i.price * i.qty).toLocaleString()} ֏</span>
            </div>`).join("");

          list.innerHTML += `
            <div class="bg-white p-3 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-black text-gray-800">${h.customer}</span>
                    <span class="font-bold text-green-600 text-sm">${h.total.toLocaleString()} ֏</span>
                </div>
                <div class="bg-gray-50 p-2 rounded-xl space-y-1">${itemsHtml}</div>
                <div class="text-[8px] text-gray-400 mt-2 text-right">${h.date}</div>
            </div>`;
        });
      }

      renderCatalog();
    </script>
  </body>
</html>
