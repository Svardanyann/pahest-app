<!DOCTYPE html>
<html lang="hy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Իմ Պահեստը</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .cart-badge { position: absolute; top: -5px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
      .modal-anim { animation: fadeIn 0.2s ease-out; }
      @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
  </head>
  <body class="bg-gray-100 pb-24">
    <!-- Վերևի Մաս -->
    <div class="bg-blue-600 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
      <h1 class="font-bold text-lg italic">Իմ Վաճառքները</h1>
      <button onclick="openModal()" class="bg-white text-blue-600 px-3 py-1 rounded-lg text-sm font-bold shadow-lg active:scale-95 transition-transform">+ Ապրանք</button>
    </div>

    <div id="app" class="p-4">
      <!-- Կատալոգի Բաժին -->
      <div id="catalog-section">
        <h2 class="font-bold mb-4 text-gray-700 flex justify-between items-center">
            Ապրանքների Կատալոգ
            <span class="text-xs font-normal text-gray-400" id="prod-total-count">0 հատ</span>
        </h2>
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
      </div>

      <!-- Պատմության Բաժին -->
      <div id="history-section" class="hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-gray-700 text-lg">Պատվերների Պատմություն</h2>
            <button onclick="clearHistory()" class="text-red-500 text-xs border border-red-200 px-2 py-1 rounded">Ջնջել բոլորը</button>
        </div>
        <div id="history-list" class="space-y-4 text-sm"></div>
      </div>
    </div>

    <!-- Զամբյուղի լողացող կոճակ -->
    <div id="cart-btn" class="fixed bottom-20 right-4 z-20 hidden">
        <button onclick="showCart()" class="bg-orange-500 text-white p-4 rounded-full shadow-2xl relative active:scale-90 transition-transform">
            <span class="text-2xl">🛒</span>
            <span id="cart-count" class="cart-badge font-bold">0</span>
        </button>
    </div>

    <!-- Նկարը մեծացնելու պատուհան -->
    <div id="image-modal" class="fixed inset-0 bg-black bg-opacity-95 hidden flex items-center justify-center z-50 p-4" onclick="closeImage()">
        <img id="full-image" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl modal-anim">
        <button class="absolute top-5 right-5 text-white text-4xl font-light">&times;</button>
    </div>

    <!-- Նոր Ապրանքի Պատուհան (Modal) -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-40">
      <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl modal-anim">
        <h3 class="font-bold mb-4 text-lg border-b pb-2">Ավելացնել Ապրանք</h3>
        <input id="prod-name" type="text" placeholder="Ապրանքի անուն" class="w-full border p-3 mb-3 rounded-xl outline-none" />
        <input id="prod-price" type="number" placeholder="Գին (֏)" class="w-full border p-3 mb-3 rounded-xl outline-none" />
        <label class="block text-xs text-gray-400 mb-1 ml-1 font-bold uppercase">Նկար</label>
        <input id="prod-img-file" type="file" accept="image/*" class="w-full border p-2 mb-5 rounded-xl text-sm" />
        <div class="flex gap-2 font-bold">
          <button onclick="closeModal()" class="flex-1 border p-3 rounded-xl text-gray-500">Չեղարկել</button>
          <button onclick="addProduct()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl">Ավելացնել</button>
        </div>
      </div>
    </div>

    <!-- Զամբյուղի Պատուհան -->
    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-40">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm max-h-[85vh] flex flex-col modal-anim shadow-2xl">
            <h3 class="font-bold mb-4 text-xl border-b pb-2 flex justify-between">
                <span>🛒 Զամբյուղ</span>
                <button onclick="closeCart()" class="text-gray-400">&times;</button>
            </h3>
            <div id="cart-items" class="space-y-3 mb-4 overflow-y-auto flex-1 pr-1"></div>
            <div class="font-bold text-lg text-right mb-4 text-blue-600 pt-2 border-t" id="cart-total-price">Ընդհանուր՝ 0 ֏</div>
            <button onclick="checkout()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-xl active:bg-green-700 uppercase">ՊԱՀՊԱՆԵԼ ՊԱՏՎԵՐԸ</button>
        </div>
    </div>

    <!-- Ներքևի Մենյու -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-2xl z-10">
      <button onclick="showSection('catalog')" class="text-blue-600 font-bold flex flex-col items-center flex-1" id="nav-catalog">
        <span class="text-2xl">📦</span> <span class="text-[10px]">ԿԱՏԱԼՈԳ</span>
      </button>
      <button onclick="showSection('history')" class="text-gray-400 font-bold flex flex-col items-center flex-1" id="nav-history">
        <span class="text-2xl">📜</span> <span class="text-[10px]">ՊԱՏՄՈՒԹՅՈՒՆ</span>
      </button>
    </nav>

    <script>
      let products = JSON.parse(localStorage.getItem("myProducts")) || [];
      let history = JSON.parse(localStorage.getItem("orderHistory")) || [];
      let cart = [];

      function showSection(section) {
        document.getElementById("catalog-section").classList.toggle("hidden", section !== "catalog");
        document.getElementById("history-section").classList.toggle("hidden", section !== "history");
        document.getElementById("nav-catalog").classList.toggle("text-blue-600", section === "catalog");
        document.getElementById("nav-catalog").classList.toggle("text-gray-400", section !== "catalog");
        document.getElementById("nav-history").classList.toggle("text-blue-600", section === "history");
        document.getElementById("nav-history").classList.toggle("text-gray-400", section !== "history");
        if (section === "history") renderHistory();
      }

      function openModal() { document.getElementById("modal").classList.remove("hidden"); }
      function closeModal() { document.getElementById("modal").classList.add("hidden"); }
      function openImage(src) { document.getElementById("full-image").src = src; document.getElementById("image-modal").classList.remove("hidden"); }
      function closeImage() { document.getElementById("image-modal").classList.add("hidden"); }

      async function addProduct() {
        const name = document.getElementById("prod-name").value;
        const price = document.getElementById("prod-price").value;
        const fileInput = document.getElementById("prod-img-file");
        let imgBase64 = "https://via.placeholder.com/150?text=No+Image";

        if (name && price) {
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.readAsDataURL(fileInput.files[0]);
                reader.onload = function () {
                    saveProductToStorage(name, price, reader.result);
                };
            } else {
                saveProductToStorage(name, price, imgBase64);
            }
        }
      }

      function saveProductToStorage(name, price, img) {
          products.push({ id: Date.now(), name, price: parseInt(price), img });
          localStorage.setItem("myProducts", JSON.stringify(products));
          renderCatalog();
          closeModal();
          document.getElementById("prod-name").value = "";
          document.getElementById("prod-price").value = "";
          document.getElementById("prod-img-file").value = "";
      }

      function deleteProduct(id) {
          if (confirm("Ջնջե՞լ ապրանքը:")) {
              products = products.filter(p => p.id !== id);
              localStorage.setItem("myProducts", JSON.stringify(products));
              renderCatalog();
          }
      }

      function renderCatalog() {
        const list = document.getElementById("product-list");
        document.getElementById("prod-total-count").innerText = products.length + " հատ";
        list.innerHTML = products.length === 0 ? '<div class="col-span-2 text-center py-20 text-gray-400">Դատարկ է</div>' : "";
        products.forEach((p) => {
          list.innerHTML += `
            <div class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 relative overflow-hidden">
                <button onclick="deleteProduct(${p.id})" class="absolute top-1 right-1 bg-white/80 w-6 h-6 rounded-full text-[10px] z-10 shadow-sm">🗑️</button>
                <img src="${p.img}" onclick="openImage('${p.img}')" class="w-full h-32 object-cover rounded-xl mb-2 shadow-inner">
                <div class="font-bold text-[11px] h-8 overflow-hidden px-1">${p.name}</div>
                <div class="text-blue-600 font-black text-sm px-1 mb-2">${p.price.toLocaleString()} ֏</div>
                <button onclick="addToCart(${p.id})" class="w-full bg-orange-500 text-white py-2 rounded-xl text-[10px] font-bold shadow-md active:bg-orange-600 uppercase">+ Ավելացնել</button>
            </div>`;
        });
      }

      function addToCart(prodId) {
          const product = products.find(p => p.id === prodId);
          const qty = prompt(product.name + "\nՔանակը:", 1);
          if (qty > 0) { cart.push({ ...product, qty: parseInt(qty) }); updateCartUI(); }
      }

      function updateCartUI() {
          const count = cart.length;
          document.getElementById("cart-count").innerText = count;
          document.getElementById("cart-btn").classList.toggle("hidden", count === 0);
      }

      function showCart() {
          document.getElementById("cart-modal").classList.remove("hidden");
          const container = document.getElementById("cart-items");
          container.innerHTML = "";
          let total = 0;
          cart.forEach((item) => {
              total += item.price * item.qty;
              container.innerHTML += `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-xl border border-gray-100">
                    <div class="flex items-center gap-2">
                        <img src="${item.img}" class="w-10 h-10 object-cover rounded-lg shadow-sm">
                        <div class="flex flex-col text-[12px]">
                            <span class="font-bold">${item.name}</span>
                            <span class="text-gray-400">${item.price} x ${item.qty}</span>
                        </div>
                    </div>
                    <span class="font-bold text-blue-600">${(item.price * item.qty).toLocaleString()} ֏</span>
                </div>`;
          });
          document.getElementById("cart-total-price").innerText = "Ընդհանուր՝ " + total.toLocaleString() + " ֏";
      }

      function closeCart() { document.getElementById("cart-modal").classList.add("hidden"); }

      function checkout() {
          const orderName = prompt("Մուտքագրեք պատվերի անունը (օր.՝ Լիպարիտ):");
          if (!orderName) return;

          const order = {
              id: Date.now(),
              customer: orderName,
              items: [...cart],
              total: cart.reduce((sum, item) => sum + (item.price * item.qty), 0),
              date: new Date().toLocaleString("hy-AM")
          };

          history.unshift(order);
          localStorage.setItem("orderHistory", JSON.stringify(history));
          
          // ԶԱՄԲՅՈՒՂԸ ՄԱՔՐՈՒՄ ԵՆՔ ՈՒ ՓԱԿՈՒՄ ՊԱՏՈՒՀԱՆԸ
          cart = [];
          updateCartUI();
          closeCart();
          showSection('history');
          alert("Պատվերը պահպանվեց!");
      }

      function clearHistory() {
          if (confirm("Մաքրե՞լ պատմությունը:")) { history = []; localStorage.setItem("orderHistory", JSON.stringify(history)); renderHistory(); }
      }

      function renderHistory() {
        const list = document.getElementById("history-list");
        list.innerHTML = history.length === 0 ? '<div class="text-center py-20 text-gray-400 italic">Դեռ չկա</div>' : "";
        history.forEach((h) => {
          let itemsList = h.items.map(i => `
            <div class="flex justify-between items-center py-1 border-b border-gray-50 last:border-0">
                <div class="flex items-center gap-2">
                    <img src="${i.img}" class="w-8 h-8 object-cover rounded shadow-sm">
                    <span class="text-[11px] text-gray-600">${i.name} (x${i.qty})</span>
                </div>
                <span class="text-[11px] font-bold text-gray-800">${(i.price * i.qty).toLocaleString()} ֏</span>
            </div>`).join("");
          list.innerHTML += `
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex flex-col">
                        <span class="font-black text-gray-800 text-base">${h.customer}</span>
                        <span class="text-[10px] text-gray-400 italic">${h.date}</span>
                    </div>
                    <span class="font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg">${h.total.toLocaleString()} ֏</span>
                </div>
                <div class="bg-gray-50/50 p-2 rounded-xl space-y-1">${itemsList}</div>
            </div>`;
        });
      }

      renderCatalog();
    </script>
  </body>
</html>
