<!DOCTYPE html>
<html lang="hy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Իմ Պահեստը</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .cart-badge { position: absolute; top: -5px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
    </style>
  </head>
  <body class="bg-gray-100 pb-24">
    <!-- Վերևի Մաս -->
    <div class="bg-blue-600 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
      <h1 class="font-bold text-lg">Իմ Վաճառքները</h1>
      <div class="flex gap-3">
        <button onclick="openModal()" class="bg-white text-blue-600 px-3 py-1 rounded-lg text-sm font-bold shadow">+ Ապրանք</button>
      </div>
    </div>

    <div id="app" class="p-4">
      <!-- Կատալոգի Բաժին -->
      <div id="catalog-section">
        <h2 class="font-bold mb-4 text-gray-700">Ապրանքների Կատալոգ</h2>
        <div id="product-list" class="grid grid-cols-2 gap-4"></div>
      </div>

      <!-- Պատմության Բաժին -->
      <div id="history-section" class="hidden">
        <h2 class="font-bold mb-4 text-gray-700 text-lg">Պատվերների Պատմություն</h2>
        <div id="history-list" class="space-y-4"></div>
      </div>
    </div>

    <!-- Զամբյուղի լողացող կոճակ -->
    <div id="cart-btn" class="fixed bottom-20 right-4 z-20 hidden">
        <button onclick="showCart()" class="bg-orange-500 text-white p-4 rounded-full shadow-lg relative">
            <span>🛒</span>
            <span id="cart-count" class="cart-badge">0</span>
        </button>
    </div>

    <!-- Նոր Ապրանքի Պատուհան (Modal) -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-30">
      <div class="bg-white p-6 rounded-xl w-full max-w-sm shadow-2xl">
        <h3 class="font-bold mb-4 text-lg">Ավելացնել Ապրանք</h3>
        <input id="prod-name" type="text" placeholder="Ապրանքի անուն" class="w-full border p-3 mb-3 rounded-lg outline-none focus:border-blue-500" />
        <input id="prod-price" type="number" placeholder="Գին (֏)" class="w-full border p-3 mb-3 rounded-lg outline-none focus:border-blue-500" />
        
        <label class="block text-sm text-gray-500 mb-1">Ընտրեք նկարը</label>
        <input id="prod-img-file" type="file" accept="image/*" class="w-full border p-2 mb-4 rounded-lg text-sm" />
        
        <div class="flex gap-2">
          <button onclick="closeModal()" class="flex-1 border p-3 rounded-lg hover:bg-gray-50">Փակել</button>
          <button onclick="addProduct()" class="flex-1 bg-blue-600 text-white p-3 rounded-lg font-bold shadow-lg">Պահպանել</button>
        </div>
      </div>
    </div>

    <!-- Զամբյուղի Պատուհան -->
    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-30">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm max-h-[80vh] overflow-y-auto">
            <h3 class="font-bold mb-4 text-lg border-b pb-2">Նոր Պատվեր</h3>
            <div id="cart-items" class="space-y-2 mb-4"></div>
            <div class="font-bold text-right mb-4 text-blue-600" id="cart-total-price">Ընդհանուր՝ 0 ֏</div>
            <div class="flex gap-2">
                <button onclick="closeCart()" class="flex-1 border p-2 rounded-lg">Հետ</button>
                <button onclick="checkout()" class="flex-1 bg-green-600 text-white p-2 rounded font-bold shadow">Պահպանել Պատվերը</button>
            </div>
        </div>
    </div>

    <!-- Ներքևի Մենյու -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-inner z-10">
      <button onclick="showSection('catalog')" class="text-blue-600 font-bold flex flex-col items-center">
        <span class="text-xl">📦</span> Կատալոգ
      </button>
      <button onclick="showSection('history')" class="text-gray-500 font-bold flex flex-col items-center" id="nav-history">
        <span class="text-xl">📜</span> Պատմություն
      </button>
    </nav>
    <!-- Նկարը մեծացնելու պատուհան -->
<div id="image-modal" class="fixed inset-0 bg-black bg-opacity-90 hidden flex items-center justify-center z-50 p-4" onclick="closeImage()">
    <img id="full-image" src="" class="max-w-full max-h-full rounded-lg shadow-2xl">
    <button class="absolute top-5 right-5 text-white text-3xl font-bold">&times;</button>
</div>

    <script>
      let products = JSON.parse(localStorage.getItem("myProducts")) || [];
      let history = JSON.parse(localStorage.getItem("orderHistory")) || [];
      let cart = [];

      function showSection(section) {
        document.getElementById("catalog-section").classList.toggle("hidden", section !== "catalog");
        document.getElementById("history-section").classList.toggle("hidden", section !== "history");
        
        // Փոխել կոճակների գույները
        const navHistory = document.getElementById("nav-history");
        if (section === "history") {
            renderHistory();
            navHistory.classList.add("text-blue-600");
        } else {
            navHistory.classList.remove("text-blue-600");
        }
      }

      function openModal() { document.getElementById("modal").classList.remove("hidden"); }
      function closeModal() { document.getElementById("modal").classList.add("hidden"); }

      // Նկարը վերածել Base64-ի, որ պահվի հեռախոսում
      async function addProduct() {
        const name = document.getElementById("prod-name").value;
        const price = document.getElementById("prod-price").value;
        const fileInput = document.getElementById("prod-img-file");
        let imgBase64 = "https://via.placeholder.com/150?text=No+Image";

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = function () {
                imgBase64 = reader.result;
                saveProductToStorage(name, price, imgBase64);
            };
        } else {
            saveProductToStorage(name, price, imgBase64);
        }
      }

      function saveProductToStorage(name, price, img) {
        if (name && price) {
          products.push({ id: Date.now(), name, price: parseInt(price), img });
          localStorage.setItem("myProducts", JSON.stringify(products));
          renderCatalog();
          closeModal();
          document.getElementById("prod-name").value = "";
          document.getElementById("prod-price").value = "";
          document.getElementById("prod-img-file").value = "";
        } else {
            alert("Լրացրեք բոլոր դաշտերը");
        }
      }

      function renderCatalog() {
    const list = document.getElementById("product-list");
    list.innerHTML = products.length === 0 ? '<p class="col-span-2 text-center text-gray-400 mt-10">Ապրանք չկա</p>' : "";
    products.forEach((p) => {
      list.innerHTML += `
        <div class="bg-white p-2 rounded-lg shadow border border-gray-100">
            <!-- Այստեղ ավելացրել ենք onclick="openImage('${p.img}')" -->
            <img src="${p.img}" 
                 onclick="openImage('${p.img}')" 
                 class="w-full h-32 object-cover rounded mb-2 shadow-sm cursor-pointer active:opacity-80">
            <div class="font-bold text-sm h-10 overflow-hidden">${p.name}</div>
            <div class="text-blue-600 font-bold mb-2">${p.price} ֏</div>
            <button onclick="addToCart(${p.id})" class="w-full bg-orange-500 text-white py-2 rounded-lg text-xs font-bold">+ Ավելացնել</button>
        </div>`;
    });
}

      function addToCart(prodId) {
          const product = products.find(p => p.id === prodId);
          const qty = prompt(product.name + " - Քանակը:", 1);
          if (qty > 0) {
              cart.push({ ...product, qty: parseInt(qty) });
              updateCartUI();
          }
      }

      function updateCartUI() {
          const count = cart.length;
          document.getElementById("cart-count").innerText = count;
          document.getElementById("cart-btn").classList.toggle("hidden", count === 0);
      }

      function showCart() {
          document.getElementById("cart-modal").classList.remove("hidden");
          const container = document.getElementById("cart-items");
          container.innerHTML = "";
          let total = 0;
          cart.forEach((item, index) => {
              const subtotal = item.price * item.qty;
              total += subtotal;
              container.innerHTML += `
                <div class="flex justify-between items-center text-sm bg-gray-50 p-2 rounded">
                    <span>${item.name} (x${item.qty})</span>
                    <span class="font-bold">${subtotal} ֏</span>
                </div>`;
          });
          document.getElementById("cart-total-price").innerText = "Ընդհանուր՝ " + total + " ֏";
      }

      function closeCart() { document.getElementById("cart-modal").classList.add("hidden"); }

      function checkout() {
          const orderName = prompt("Մուտքագրեք պատվերի անունը (օր.՝ Հաճախորդի անունը):");
          if (!orderName) return;

          let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
          const order = {
              id: Date.now(),
              customer: orderName,
              items: [...cart],
              total: total,
              date: new Date().toLocaleString("hy-AM")
          };

          history.unshift(order);
          localStorage.setItem("orderHistory", JSON.stringify(history));
          cart = [];
          updateCartUI();
          closeCart();
          alert("Պատվերը պահպանվեց հաջողությամբ!");
          showSection('history');
      }
      function openImage(src) {
    const modal = document.getElementById("image-modal");
    const fullImg = document.getElementById("full-image");
    fullImg.src = src;
    modal.classList.remove("hidden");
}

function closeImage() {
    document.getElementById("image-modal").classList.add("hidden");
}

      function renderHistory() {
        const list = document.getElementById("history-list");
        list.innerHTML = history.length === 0 ? '<p class="text-center text-gray-400">Պատվերներ չկան</p>' : "";
        history.forEach((h) => {
          let itemsList = h.items.map(i => `<div class="flex justify-between text-xs text-gray-600"><span>${i.name} x${i.qty}</span><span>${i.price * i.qty} ֏</span></div>`).join("");
          list.innerHTML += `
            <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-500">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold text-blue-800">${h.customer}</span>
                    <span class="font-bold text-green-600">${h.total} ֏</span>
                </div>
                <div class="border-y py-2 my-2 space-y-1">${itemsList}</div>
                <div class="text-[10px] text-gray-400 italic">${h.date}</div>
            </div>`;
        });
      }

      renderCatalog();
    </script>
  </body>
</html>
