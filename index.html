<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Իմ Պահեստը</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Նկարների միանման չափսեր */
        .img-container {
            width: 100%;
            height: 140px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border-radius: 8px;
        }
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
        }
        .qty-btn {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ef4444;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
        }
        .qty-btn.plus { background: #22c55e; }
        .qty-input { width: 40px; text-align: center; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <div class="bg-blue-600 text-white p-4 sticky top-0 z-10 flex justify-between items-center shadow-md">
        <h1 class="font-bold">Իմ Վաճառքները</h1>
        <button onclick="openModal()" class="bg-white text-blue-600 px-3 py-1 rounded-lg text-sm font-bold">
            + Նոր Ապրանք
        </button>
    </div>

    <div id="app" class="p-4">
        <div id="catalog-section">
            <h2 class="font-bold mb-4 text-gray-700 uppercase text-sm tracking-widest">Ապրանքների Կատալոգ</h2>
            <div id="product-list" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="history-section" class="hidden">
            <h2 class="font-bold mb-4 text-gray-700 text-lg">Պատվերների Պատմություն</h2>
            <div id="history-list" class="space-y-3"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-inner z-10">
        <button onclick="showSection('catalog')" class="flex flex-col items-center text-blue-600">
            <span class="text-xl">📦</span>
            <span class="text-xs font-bold">Կատալոգ</span>
        </button>
        <button onclick="showSection('history')" class="flex flex-col items-center text-gray-500">
            <span class="text-xl">📜</span>
            <span class="text-xs font-bold">Պատմություն</span>
        </button>
    </nav>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-20">
        <div class="bg-white p-6 rounded-xl w-full max-w-sm">
            <h3 class="font-bold mb-4 italic text-blue-600 underline">Ավելացնել Ապրանք</h3>
            <input id="prod-name" type="text" placeholder="Անուն" class="w-full border p-2 mb-2 rounded" />
            <input id="prod-price" type="number" placeholder="Գին (֏)" class="w-full border p-2 mb-2 rounded" />
            <input id="prod-img" type="text" placeholder="Նկարի անուն (օր. paminak.jpg)" class="w-full border p-2 mb-4 rounded" />
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 border p-2 rounded">Փակել</button>
                <button onclick="addProduct()" class="flex-1 bg-blue-600 text-white p-2 rounded font-bold">Ավելացնել</button>
            </div>
        </div>
    </div>

    <script>
        const imgPath = "images/"; 
        let products = JSON.parse(localStorage.getItem("myProducts")) || [
            { id: 1, name: "Paminak", price: 100, img: "paminak.jpg" },
            { id: 2, name: "Paminak 1", price: 120, img: "paminak1.jpg" },
            { id: 3, name: "Պամինակ", price: 110, img: "paminak2.jpg" }
        ];
        let history = JSON.parse(localStorage.getItem("orderHistory")) || [];
        let tempQty = {};

        function showSection(section) {
            document.getElementById("catalog-section").classList.toggle("hidden", section !== "catalog");
            document.getElementById("history-section").classList.toggle("hidden", section !== "history");
            if (section === "history") renderHistory();
        }

        function renderCatalog() {
            const list = document.getElementById("product-list");
            list.innerHTML = "";
            products.forEach((p) => {
                if (!tempQty[p.id]) tempQty[p.id] = 1;
                const finalImg = p.img.includes('http') ? p.img : imgPath + p.img;
                
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
                        <div class="img-container">
                            <img src="${finalImg}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        </div>
                        <div class="font-bold text-sm mt-2 text-gray-800">${p.name}</div>
                        <div class="text-blue-600 font-extrabold mb-3">${p.price} ֏</div>
                        
                        <div class="mt-auto">
                            <div class="flex items-center justify-between mb-2 bg-gray-50 rounded-lg p-1">
                                <button onclick="changeQty(${p.id}, -1)" class="qty-btn">-</button>
                                <span class="qty-input" id="qty-${p.id}">${tempQty[p.id]}</span>
                                <button onclick="changeQty(${p.id}, 1)" class="qty-btn plus">+</button>
                            </div>
                            <button onclick="confirmOrder(${p.id})" class="w-full bg-green-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">
                                Գրանցել Պատվեր
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function changeQty(id, delta) {
            tempQty[id] = (tempQty[id] || 1) + delta;
            if (tempQty[id] < 1) tempQty[id] = 1;
            document.getElementById(`qty-${id}`).innerText = tempQty[id];
        }

        function confirmOrder(id) {
            const p = products.find(x => x.id === id);
            const qty = tempQty[id];
            const order = {
                id: Date.now(),
                text: p.name + " (x" + qty + ")",
                total: p.price * qty,
                date: new Date().toLocaleString("hy-AM")
            };
            history.unshift(order);
            localStorage.setItem("orderHistory", JSON.stringify(history));
            tempQty[id] = 1;
            renderCatalog();
            alert("Պատվերը գրանցվեց!");
        }

        function renderHistory() {
            const list = document.getElementById("history-list");
            list.innerHTML = history.length === 0 ? '<p class="text-center text-gray-400 mt-10">Դեռ պատվերներ չկան</p>' : "";
            history.forEach((h) => {
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-lg shadow-sm border-l-4 border-green-500 flex justify-between items-center">
                        <div>
                            <div class="font-bold text-gray-800">${h.text}</div>
                            <div class="text-[10px] text-gray-400 italic">${h.date}</div>
                        </div>
                        <div class="text-green-600 font-bold">${h.total} ֏</div>
                    </div>
                `;
            });
        }

        function openModal() { document.getElementById("modal").classList.remove("hidden"); }
        function closeModal() { document.getElementById("modal").classList.add("hidden"); }

        function addProduct() {
            const name = document.getElementById("prod-name").value;
            const price = document.getElementById("prod-price").value;
            const img = document.getElementById("prod-img").value || "no-image.jpg";
            if (name && price) {
                products.push({ id: Date.now(), name, price, img });
                localStorage.setItem("myProducts", JSON.stringify(products));
                renderCatalog();
                closeModal();
            }
        }

        window.onload = renderCatalog;
    </script>
</body>
</html>
