<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Պատվերների համակարգ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Մատիտի icon-ի համար -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white border-b sticky top-0 z-50 px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-black text-blue-600 italic">ԿԱՏԱԼՈԳ</h1>
        <button id="cart-btn" onclick="showCart()" class="relative p-2 bg-blue-50 rounded-full hidden">
            🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full font-bold">0</span>
        </button>
    </header>
    <!-- Նկարը մեծացնելու պատուհան -->
<div id="image-zoom-modal" class="fixed inset-0 bg-black z-[100] hidden flex items-center justify-center" onclick="closeImageZoom()">
    <img id="zoomed-image" src="" class="max-w-full max-h-full object-contain">
</div>

<!-- Ապրանքը խմբագրելու պատուհան -->
<div id="edit-product-modal" class="fixed inset-0 bg-black/50 z-[70] hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
        <h2 class="text-xl font-black mb-4 italic text-blue-600">ԽՄԲԱԳՐԵԼ ԱՊՐԱՆՔԸ</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400">ԱՆՈՒՆ</label>
                <input type="text" id="edit-p-name" class="w-full bg-gray-50 border rounded-xl p-3 font-bold">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400">ԳԻՆ (֏)</label>
                <input type="number" id="edit-p-price" class="w-full bg-gray-50 border rounded-xl p-3 font-bold">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400">ՆԿԱՐ</label>
                <input type="file" id="edit-p-img-input" accept="image/*" class="w-full text-xs">
                <img id="edit-p-preview" src="" class="w-20 h-20 object-cover rounded-xl mt-2 border">
            </div>
        </div>

        <div class="flex gap-2 mt-6">
            <button onclick="closeEditProduct()" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">ՉԵՂԱՐԿԵԼ</button>
            <button onclick="saveProductChanges()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">ՊԱՀՊԱՆԵԼ</button>
        </div>
    </div>
</div>

    <main id="catalog-section" class="p-4 pb-32">
        <div id="product-list" class="grid grid-cols-2 gap-3"></div>
    </main>

    <section id="history-section" class="hidden p-4 pb-32">
        <div class="flex justify-between items-center mb-4 text-[10px]">
            <h2 class="text-lg font-black italic text-gray-400">ՊԱՏՄՈՒԹՅՈՒՆ</h2>
            <div class="flex gap-2">
                <button onclick="toggleSelectAll()" class="bg-gray-200 px-3 py-1.5 rounded-lg font-bold">Ընտրել բոլորը</button>
                <button id="delete-selected-btn" onclick="deleteSelected()" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg font-bold hidden italic">Ջնջել</button>
            </div>
        </div>
        <div id="history-list"></div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex py-2 px-6 shadow-lg z-50">
        <button id="nav-catalog" onclick="showSection('catalog')" class="flex flex-col items-center flex-1 text-blue-600 font-bold">
            <span class="text-xl">📦</span>
            <span class="text-[10px]">Կատալոգ</span>
        </button>
        <button id="nav-history" onclick="showSection('history')" class="flex flex-col items-center flex-1 text-gray-400">
            <span class="text-xl">📜</span>
            <span class="text-[10px]">Պատմություն</span>
        </button>
    </nav>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-6 max-h-[80vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black">Զամբյուղ</h2>
                <button onclick="closeCart()" class="text-2xl font-light">✕</button>
            </div>
            <div id="cart-items" class="mb-6"></div>
            <div class="flex justify-between items-center mb-6 pt-4 border-t">
                <span class="font-bold text-gray-500">Ընդհանուր</span>
                <span id="cart-total-price" class="text-xl font-black text-blue-600">0 ֏</span>
            </div>
            <button onclick="checkout()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg active:scale-95 transition-all shadow-lg shadow-blue-200">
                <span id="checkout-btn-text">ՊԱՏՎԻՐԵԼ</span>
            </button>
        </div>
    </div>

    <div id="order-details-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 relative shadow-2xl">
            <button onclick="closeOrderDetails()" class="absolute top-4 right-4 text-xl text-gray-400">✕</button>
            <div id="order-details-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
