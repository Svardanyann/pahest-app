<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Իմ Խանութը</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Կատալոգի Բաժին -->
    <div id="catalog-section" class="p-4 pb-24">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-gray-800">Ապրանքներ</h1>
            <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-blue-200">+ ՆՈՐ</button>
        </div>
        <div id="product-list" class="grid grid-cols-2 gap-3"></div>
    </div>

    <!-- Պատմության Բաժին -->
<div id="history-section" class="hidden p-4 pb-24">
    <div class="flex flex-col gap-4 mb-6">
        <h1 class="text-2xl font-black text-gray-800">Պատվերներ</h1>
        <div class="flex gap-2">
            <!-- Բոլորը ընտրելու նոր կոճակ -->
            <button id="select-all-btn" onclick="toggleSelectAll()" class="flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-xl text-xs font-bold">
                Ընտրել բոլորը
            </button>
            <button id="delete-selected-btn" onclick="deleteSelected()" class="hidden flex-1 bg-red-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-red-200">
                Ջնջել (0)
            </button>
        </div>
    </div>
    <div id="history-list" class="space-y-1"></div>
</div>

    <!-- Ներքևի Նավիգացիա -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t flex py-3 px-6 z-50">
        <button id="nav-catalog" onclick="showSection('catalog')" class="flex flex-col items-center flex-1 text-blue-600 font-bold">
            <span class="text-xl">🏠</span><span class="text-[10px]">Խանութ</span>
        </button>
        <button id="nav-history" onclick="showSection('history')" class="flex flex-col items-center flex-1 text-gray-400">
            <span class="text-xl">📜</span><span class="text-[10px]">Պատմություն</span>
        </button>
    </div>

    <!-- Զամբյուղի Կոճակ -->
    <button id="cart-btn" onclick="showCart()" class="hidden fixed bottom-20 right-4 bg-orange-500 text-white p-4 rounded-full shadow-2xl z-50 animate-bounce">
        🛒 <span id="cart-count" class="bg-white text-orange-500 rounded-full px-2 py-0.5 text-xs font-black ml-1">0</span>
    </button>

    <!-- Ավելացման Մոդալ -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-6 shadow-2xl">
            <h2 class="text-xl font-black mb-4">Ապրանքի տվյալներ</h2>
            <input id="prod-name" type="text" placeholder="Ապրանքի անունը" class="w-full border p-4 rounded-2xl mb-3 outline-none focus:border-blue-500 bg-gray-50">
            <input id="prod-price" type="number" placeholder="Գինը (֏)" class="w-full border p-4 rounded-2xl mb-3 outline-none focus:border-blue-500 bg-gray-50">
            <input id="prod-img-file" type="file" accept="image/*" class="w-full mb-6 text-sm text-gray-500">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-gray-500 bg-gray-100 rounded-2xl">Չեղարկել</button>
                <button onclick="addProduct()" class="flex-1 py-4 font-bold text-white bg-blue-600 rounded-2xl shadow-lg">Ավելացնել</button>
            </div>
        </div>
    </div>

    <!-- Զամբյուղի Մոդալ -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end justify-center p-0">
        <div class="bg-white w-full max-w-lg rounded-t-[32px] p-6 animate-slide-up">
            <h2 class="text-xl font-black mb-4 text-gray-800">Ձեր զամբյուղը</h2>
            <div id="cart-items" class="space-y-3 max-h-64 overflow-y-auto mb-6"></div>
            <div class="flex justify-between items-center mb-6 font-black text-lg">
                <span>Ընդհանուր՝</span><span id="cart-total-price" class="text-blue-600">0 ֏</span>
            </div>
            <div class="flex gap-2">
                <button onclick="closeCart()" class="flex-1 py-4 font-bold text-gray-500 bg-gray-100 rounded-2xl">Հետ</button>
                <button onclick="checkout()" class="flex-[2] py-4 font-bold text-white bg-green-500 rounded-2xl shadow-lg">
    <span id="checkout-btn-text">ՊԱՏՎԻՐԵԼ</span>
</button>
            </div>
        </div>
    </div>

    <!-- Պատվերի մանրամասների պատուհան (Նոր) -->
    <div id="order-details-modal" class="hidden fixed inset-0 z-[110] flex items-end justify-center p-0">
        <div onclick="closeOrderDetails()" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-lg rounded-t-[32px] p-6 shadow-2xl animate-slide-up">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div id="order-details-content"></div>
            <button onclick="closeOrderDetails()" class="w-full mt-6 bg-gray-100 text-gray-800 py-4 rounded-2xl font-black">ՓԱԿԵԼ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
