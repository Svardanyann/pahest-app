<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pahest - Կատալոգ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Նկարների ֆիքսված չափսեր բոլորի համար */
        .product-img-container {
            width: 100%;
            height: 180px; /* Բոլոր նկարները կունենան այս բարձրությունը */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            border-radius: 8px 8px 0 0;
        }
        .product-img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Նկարը չի ձգվի, կերևա ամբողջությամբ */
            padding: 5px;
        }

        /* Ներքևի ֆիքսված մենյու */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -2px 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .bottom-nav button {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
        }
        body { padding-bottom: 80px; }

        /* Քանակի կառավարում */
        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #f0f0f0;
            border-radius: 20px;
            margin: 10px auto;
            width: 80%;
            padding: 5px;
        }
        .qty-btn {
            background: #fff;
            border: 1px solid #ddd;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }
        .qty-num {
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="page-title">ԿԱՏԱԼՈԳ</h1>
    </header>

    <section id="catalog-section">
        <div id="catalog-grid" class="grid"></div>
    </section>

    <section id="history-section" style="display:none;">
        <div id="history-list"></div>
    </section>

    <nav class="bottom-nav">
        <button onclick="showSection('catalog')">🏠</button>
        <button onclick="openCart()">🛒 <span id="cart-count">0</span></button>
        <button onclick="showSection('history')">📜</button>
    </nav>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCart()">&times;</span>
            <h2>Զամբյուղ</h2>
            <div id="cart-items"></div>
            <hr>
            <p>Ընդհանուր: <b id="cart-total">0</b> դրամ</p>
            <!-- «Հաստատել պատվեր» կոճակը հեռացված է -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
